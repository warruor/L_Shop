<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Магазин</title>
</head>
<body>
    <header>
        <h1>Магазин</h1>
        <nav>
            <button onclick="showPage('home')">Главная</button>
            <button onclick="showPage('cart')">Корзина</button>
           
            <button onclick="showPage('login')">Вход</button>
            <button onclick="showPage('delivery')">Доставка</button>
        </nav>
    </header>

    <main id="content">
        <div id="home" class="page">
            <h2>Товары</h2>
            <div class="container">
                <div class="filter">
                    <h3>Фильтры</h3>
                    <label for="minPrice">Минимальная цена:</label>
                    <input type="number" id="minPrice" placeholder="0">

                    <label for="maxPrice">Максимальная цена:</label>
                    <input type="number" id="maxPrice" placeholder="1000">

                    <h4>Доставка:</h4>
                    <select id="deliveryTime">
                        <option value="">Выберите вариант</option>
                        <option value="tomorrow">Завтра</option>
                        <option value="dayAfterTomorrow">Послезавтра</option>
                        <option value="nextWeek">На следующей неделе</option>
                    </select>

                    <button onclick="resetFilters()">Сбросить фильтры</button>
                </div>

                <div class="product-container">
                    <div class="product" data-title="Товар 1" data-price="100">
                        <img src="https://via.placeholder.com/150" alt="Товар 1">
                        <h3>Товар 1</h3>
                        <p class="price">Цена: 100 рублей</p>
                        <button onclick="addToCart('Товар 1', 100)">В корзину</button>
                    </div>
                    <div class="product" data-title="Товар 2" data-price="200">
                        <img src="https://via.placeholder.com/150" alt="Товар 2">
                        <h3>Товар 2</h3>
                        <p class="price">Цена: 200 рублей</p>
                        <button onclick="addToCart('Товар 2', 200)">В корзину</button>
                    </div>
                    <div class="product" data-title="Товар 3" data-price="150">
                        <img src="https://via.placeholder.com/150" alt="Товар 3">
                        <h3>Товар 3</h3>
                        <p class="price">Цена: 150 рублей</p>
                        <button onclick="addToCart('Товар 3', 150)">В корзину</button>
                    </div>
                    <div class="product" data-title="Товар 4" data-price="250">
                        <img src="https://via.placeholder.com/150" alt="Товар 4">
                        <h3>Товар 4</h3>
                        <p class="price">Цена: 250 рублей</p>
                        <button onclick="addToCart('Товар 4', 250)">В корзину</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="cart" class="page" style="display: none;">
            <h2>Корзина</h2>
            <div id="cartItems"></div>
            <button onclick="showPage('delivery')">Оформить доставку</button>
        </div>

        <div id="registration" class="page" style="display: none;">
            <h2>Регистрация</h2>
            <form data-registration>
                <input type="text" placeholder="Имя" required>
                <input type="email" placeholder="Email" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
            <p>Уже зарегистрированы? <button onclick="showPage('login')">Войти</button></p>
        </div>

        <div id="login" class="page" style="display: none;">
            <h2>Вход</h2>
            <form data-login>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <p>Еще не зарегистрированы? <button onclick="showPage('registration')">Создать аккаунт</button></p>
        </div>

        <div id="delivery" class="page" style="display: none;">
            <h2>Доставка</h2>
            <form data-delivery>
                <input type="text" placeholder="Адрес" required>
                <button type="submit">Оформить</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
